name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2.8.2

      - name: Cargo fmt
        run: cargo fmt --all --check

      - name: Cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          cache-dependency-glob: uv.lock

      - name: Install Python dev deps
        run: uv sync --extra dev

      - name: Ruff check
        run: uv run ruff check py_src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check py_src/ tests/

      - name: Mypy
        run: uv run mypy py_src/reclink/ --no-incremental

  rust-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2.8.2
        with:
          save-if: false

      - name: Run Rust tests
        run: cargo test --workspace

  test:
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.12", "3.13"]
        include:
          - os: macos-latest
            python-version: "3.13"
          - os: macos-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2.8.2
        with:
          save-if: ${{ matrix.os != 'ubuntu-latest' }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Build native extension
        uses: PyO3/maturin-action@v1
        with:
          command: develop
          args: --release

      - name: Run Python tests
        run: uv run pytest tests/python/ -v
